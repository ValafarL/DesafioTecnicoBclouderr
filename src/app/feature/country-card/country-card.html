<div class="container">
  <div class="container-info">
    <img [src]="country().flags.png" [alt]="country().flags.alt" class="flag" />
    <div class="info">
      <h2>{{ country().name.common }}</h2>
      <p>Region: {{ country().region }}</p>
    </div>
    <div class="info">
      <p>Population: {{ formatNumber(country().population) }}</p>
      <p>Area: {{ formatNumber(country().area) }} km²</p>
    </div>
  </div>
  <button (click)="goToDetails()">View Details</button>
</div>
