<div class="container">
  <main>
    <section class="search-section">
      <div class="search-wrapper">
        <div class="search-input-wrapper">
          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            height="20px"
            viewBox="0 -960 960 960"
            width="20px"
            fill="currentColor"
          >
            <path
              d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"
            />
          </svg>
          <input
            class="search-input"
            type="text"
            placeholder="Search a country by name..."
            [formControl]="searchControl"
          />
        </div>
        <app-search-result [countries]="searchResults()"></app-search-result>
        @if(searchResults().length === 0 && searchControl.value && searchControl.value.length > 1 ) {
           <app-error-message message="No country Found"></app-error-message>
        }
      </div>
      <select class="region-select" (change)="onSelectRegion($event)">
        <option value="">Filter by Region</option>
        <option value="Africa">Africa</option>
        <option value="Americas">Americas</option>
        <option value="Asia">Asia</option>
        <option value="Europe">Europe</option>
        <option value="Oceania">Oceania</option>
      </select>
    </section>

    @if(visibleCountries() && visibleCountries().length >= 0) {
      <section>
        @for (country of visibleCountries(); track $index) {
          <app-country-card [country]="country"></app-country-card>
        }
      </section>
    }@else if(error()) {
      <app-error-message ></app-error-message>
    }@else {
      <app-loading></app-loading>
    }

    <section class="pagination">
      <button
        class="pagination-btn"
        (click)="onChangePage(currentPage() - 1)"
        [disabled]="currentPage() <= 1"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="20px"
          viewBox="0 -960 960 960"
          width="20px"
          fill="currentColor"
        >
          <path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z" />
        </svg>
        Previous
      </button>

      <div class="page-indicator">
        Page <span class="current-page">{{ currentPage() }}</span> of
        <span class="total-pages">{{ maxPages() }}</span>
      </div>

      <button
        class="pagination-btn"
        (click)="onChangePage(currentPage() + 1)"
        [disabled]="currentPage() >= maxPages()"
      >
        Next
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="20px"
          viewBox="0 -960 960 960"
          width="20px"
          fill="currentColor"
        >
          <path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z" />
        </svg>
      </button>
    </section>
  </main>
</div>
